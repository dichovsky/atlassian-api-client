name: Integration

# Opt-in integration suite that hits a real Atlassian Cloud sandbox.
# Runs nightly and on-demand; skipped on regular push/PR so sandbox load stays
# predictable. Secrets are read from the repository/org secrets store — never
# embed them in the workflow file.

on:
  schedule:
    - cron: '17 3 * * *' # 03:17 UTC nightly
  workflow_dispatch: {}

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration suite
        env:
          ATLASSIAN_INTEGRATION: '1'
          ATLASSIAN_BASE_URL: ${{ secrets.ATLASSIAN_BASE_URL }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_SPACE_ID: ${{ secrets.ATLASSIAN_SPACE_ID }}
          ATLASSIAN_PROJECT_KEY: ${{ secrets.ATLASSIAN_PROJECT_KEY }}
        run: npm run test:integration
