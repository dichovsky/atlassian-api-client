name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          # No dependency cache in release builds (supply-chain hygiene).
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      # Trusted publishing: npm authenticates via the OIDC id-token above — no
      # NPM_TOKEN needed, and provenance is generated automatically. The explicit
      # --provenance flag keeps it on and fails loudly if prerequisites go missing.
      - name: Publish
        run: npm publish --provenance
