name: Spec Drift Guard

# This workflow runs on a weekly schedule and on manual dispatch ONLY.
# It MUST NOT run on push or pull_request: fetching external specs over the network
# must never gate PR merges — a URL change or transient network failure would
# block contributors. Schedule failures surface as intended drift signals.
on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-drift:
    name: Spec Drift Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run spec drift-guard
        run: npm run spec-drift
