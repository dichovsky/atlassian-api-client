name: Bench

# Microbench regression gate. Compares current results against the committed
# baseline in `bench/baseline.json` and fails on >20% regression.
#
# Baseline is environment-sensitive — re-capture on this runner whenever the
# hardware, Node version, or bench code changes materially:
#
#   npm run bench:capture && git commit bench/baseline.json

on:
  pull_request:
    branches: ['**']
    paths:
      - 'src/core/retry.ts'
      - 'bench/**'
      - '.github/workflows/bench.yml'
  workflow_dispatch: {}

jobs:
  bench:
    name: Bench regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compare against baseline
        run: npm run bench:compare
